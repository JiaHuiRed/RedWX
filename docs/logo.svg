<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="100" height="100">
  <defs>
    <linearGradient id="cover" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E74C3C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C0392B;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Shadow -->
  <rect x="18" y="16" width="76" height="88" rx="6" fill="rgba(0,0,0,0.15)"/>
  <!-- Back cover -->
  <rect x="16" y="14" width="76" height="88" rx="6" fill="url(#cover)"/>
  <!-- Spine highlight -->
  <rect x="16" y="14" width="10" height="88" rx="6" fill="#A93226"/>
  <rect x="16" y="14" width="10" height="88" fill="rgba(255,255,255,0.08)"/>
  <!-- Pages -->
  <rect x="26" y="18" width="60" height="80" rx="3" fill="#FFF"/>
  <!-- Page shadow on right -->
  <rect x="82" y="18" width="4" height="80" rx="1" fill="rgba(0,0,0,0.06)"/>
  <!-- Red accent line -->
  <rect x="34" y="30" width="44" height="4" rx="2" fill="#E74C3C"/>
  <rect x="34" y="42" width="36" height="3" rx="1.5" fill="#E8E8E8"/>
  <rect x="34" y="52" width="40" height="3" rx="1.5" fill="#E8E8E8"/>
  <rect x="34" y="62" width="28" height="3" rx="1.5" fill="#E8E8E8"/>
  <!-- Bookmark ribbon -->
  <path d="M 58 18 L 58 8 L 66 16 L 74 8 L 74 18" fill="#E74C3C" opacity="0.9"/>
</svg>
